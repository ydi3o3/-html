<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>손 제스처 인식기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
      background: #0f0f13;
      color: #f0f0f0;
      overflow-x: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 0.75rem 2rem;
    }
    h1 { font-size: 1.15rem; font-weight: 600; margin-bottom: 0.25rem; letter-spacing: -0.02em; }
    .subtitle { font-size: 0.78rem; color: #777; margin-bottom: 1rem; }

    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 480px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #2a2a35;
      background: #111;
      /* maintain 4:3 aspect ratio */
      aspect-ratio: 4/3;
    }
    #video {
      display: block;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      transform: scaleX(-1);
      pointer-events: none;
    }
    #gesture-label {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.2rem;
      font-weight: 700;
      padding: 8px 22px;
      border-radius: 999px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: #fff;
    }
    #gesture-label.visible { opacity: 1; }

    /* big overlay effect on gesture detect */
    #big-effect {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 5rem;
      opacity: 0;
      transition: transform 0.15s ease-out, opacity 0.15s;
      pointer-events: none;
      z-index: 10;
    }
    #big-effect.pop {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }
    #big-effect.fade {
      transform: translate(-50%, -50%) scale(1.3);
      opacity: 0;
      transition: transform 0.4s ease-in, opacity 0.4s;
    }

    .btn-row {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      justify-content: center;
      width: 100%;
      max-width: 480px;
    }
    button {
      flex: 1;
      max-width: 180px;
      background: #1e1e28;
      border: 1px solid #3a3a4a;
      color: #e0e0e0;
      font-size: 0.9rem;
      padding: 11px 0;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { background: #2a2a3a; transform: scale(0.97); }

    /* camera facing toggle */
    #flip-btn {
      max-width: 52px;
      flex: 0 0 52px;
      font-size: 1.1rem;
      padding: 11px 0;
    }

    .gesture-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 480px;
    }
    .g-card {
      background: #1a1a24;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      padding: 12px 6px 10px;
      text-align: center;
      font-size: 1.5rem;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .g-card span {
      display: block;
      font-size: 0.7rem;
      color: #777;
      margin-top: 4px;
      line-height: 1.3;
    }
    .g-card.active { border-color: #7c70e0; background: #22203a; }

    .note { margin-top: 14px; font-size: 0.7rem; color: #444; text-align: center; }
  </style>
</head>
<body>
  <h1>손 제스처 인식기</h1>
  <p class="subtitle">손 모양을 카메라에 보여주세요</p>

  <div class="video-wrapper">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="gesture-label">✌️ 베리!</div>
    <div id="big-effect"></div>
  </div>

  <div class="btn-row">
    <button id="start-btn" onclick="startCamera()">📷 카메라 시작</button>
    <button id="stop-btn" onclick="stopCamera()" style="display:none;">⏹ 끄기</button>
    <button id="flip-btn" onclick="flipCamera()" style="display:none;" title="카메라 전환">🔄</button>
  </div>

  <div class="gesture-grid">
    <div class="g-card" data-g="victory">✌️<span>V → 베리!</span></div>
    <div class="g-card" data-g="thumbsup">👍<span>엄지 → 최고!</span></div>
    <div class="g-card" data-g="fist">✊<span>주먹 → 파이팅!</span></div>
    <div class="g-card" data-g="open">🖐️<span>손바닥 → 하이파이브!</span></div>
    <div class="g-card" data-g="ok">👌<span>OK → 오케이~</span></div>
    <div class="g-card" data-g="rock">🤘<span>락 → 락앤롤!</span></div>
  </div>

  <p class="note">영상은 기기 안에서만 처리되며 외부로 전송되지 않습니다</p>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script>
    const video   = document.getElementById('video');
    const canvas  = document.getElementById('overlay');
    const ctx     = canvas.getContext('2d');
    const label   = document.getElementById('gesture-label');
    const bigFx   = document.getElementById('big-effect');

    let facingMode = 'user'; // 'user' = 전면, 'environment' = 후면
    let stream = null, hands = null, rafId = null;
    let lastGesture = null, popTimeout = null;

    const GESTURES = {
      victory:  { emoji:'✌️', text:'베리!',       color:'#7c70e0cc' },
      thumbsup: { emoji:'👍', text:'최고!',        color:'#1d9e75cc' },
      fist:     { emoji:'✊', text:'파이팅!',      color:'#d85a30cc' },
      open:     { emoji:'🖐️', text:'하이파이브!', color:'#185fa5cc' },
      ok:       { emoji:'👌', text:'오케이~',      color:'#ba7517cc' },
      rock:     { emoji:'🤘', text:'락앤롤!',      color:'#d4537ecc' },
    };

    function ext(lm, tip, pip) { return lm[tip].y < lm[pip].y; }

    function classify(lm) {
      const idx   = ext(lm,8,6);
      const mid   = ext(lm,12,10);
      const ring  = ext(lm,16,14);
      const pinky = ext(lm,20,18);
      const thumbUp = lm[4].y < lm[3].y && !idx && !mid && !ring && !pinky;
      if (thumbUp)                          return 'thumbsup';
      if (idx && mid && !ring && !pinky)    return 'victory';
      if (idx && mid && ring && pinky)      return 'open';
      if (!idx && !mid && !ring && !pinky)  return 'fist';
      if (idx && !mid && !ring && pinky)    return 'rock';
      const dx = lm[4].x - lm[8].x, dy = lm[4].y - lm[8].y;
      if (Math.sqrt(dx*dx+dy*dy) < 0.07 && mid && ring && pinky) return 'ok';
      return null;
    }

    function popEmoji(g) {
      if (popTimeout) clearTimeout(popTimeout);
      bigFx.textContent = GESTURES[g].emoji;
      bigFx.className = 'pop';
      popTimeout = setTimeout(() => { bigFx.className = 'fade'; }, 600);
    }

    function updateUI(g) {
      document.querySelectorAll('.g-card').forEach(c => c.classList.remove('active'));
      if (g && GESTURES[g]) {
        const info = GESTURES[g];
        label.textContent = info.emoji + ' ' + info.text;
        label.style.background = info.color;
        label.classList.add('visible');
        document.querySelector(`.g-card[data-g="${g}"]`)?.classList.add('active');
        if (g !== lastGesture) popEmoji(g);
        lastGesture = g;
      } else {
        label.classList.remove('visible');
        lastGesture = null;
      }
    }

    function syncCanvasSize() {
      canvas.width  = video.videoWidth  || video.clientWidth;
      canvas.height = video.videoHeight || video.clientHeight;
    }

    function onResults(results) {
      syncCanvasSize();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (!results.multiHandLandmarks?.length) { updateUI(null); return; }
      const lm = results.multiHandLandmarks[0];
      if (window.drawConnectors && window.HAND_CONNECTIONS) {
        drawConnectors(ctx, lm, HAND_CONNECTIONS, { color:'rgba(124,112,224,0.5)', lineWidth:2 });
        drawLandmarks(ctx, lm, { color:'#fff', fillColor:'#7c70e0', lineWidth:1, radius:3 });
      }
      updateUI(classify(lm));
    }

    async function loop() {
      if (!stream) return;
      if (video.readyState >= 2) await hands?.send({ image: video });
      rafId = requestAnimationFrame(loop);
    }

    async function startCamera() {
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('stop-btn').style.display  = '';
      document.getElementById('flip-btn').style.display  = '';
      await initStream();
    }

    async function initStream() {
      if (stream) stream.getTracks().forEach(t => t.stop());
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode, width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
      } catch(e) {
        alert('카메라 접근 권한이 필요합니다.\n브라우저 설정에서 카메라를 허용해 주세요.');
        resetBtns(); return;
      }

      if (!window.Hands) {
        label.textContent = '모델 로딩 실패 — 인터넷 연결을 확인해주세요';
        label.classList.add('visible'); return;
      }

      if (!hands) {
        hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.7, minTrackingConfidence:0.5 });
        hands.onResults(onResults);
      }
      if (rafId) cancelAnimationFrame(rafId);
      loop();
    }

    async function flipCamera() {
      facingMode = facingMode === 'user' ? 'environment' : 'user';
      // 후면 카메라일 때 미러 해제
      video.style.transform  = facingMode === 'user' ? 'scaleX(-1)' : 'none';
      canvas.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'none';
      await initStream();
    }

    function stopCamera() {
      if (rafId) cancelAnimationFrame(rafId);
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = null; hands = null;
      video.srcObject = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      label.classList.remove('visible');
      document.querySelectorAll('.g-card').forEach(c => c.classList.remove('active'));
      resetBtns();
    }

    function resetBtns() {
      document.getElementById('start-btn').style.display = '';
      document.getElementById('stop-btn').style.display  = 'none';
      document.getElementById('flip-btn').style.display  = 'none';
    }
  </script>
</body>
</html>
